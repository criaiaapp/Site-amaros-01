<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amaros Importer - Catálogo Digital</title>
    <script>
      // Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This happens when a library tries to polyfill fetch in a restricted environment.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: false,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function() { 
                console.warn('Prevented an attempt to overwrite window.fetch');
              }
            });
          }
        } catch (e) {
          // If it's already non-configurable, this might fail, which is fine.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
